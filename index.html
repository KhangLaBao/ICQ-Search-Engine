      <script> 
function toggleMore(e){

    if(e){
        e.preventDefault();
        e.stopPropagation();
    }

    var box = document.getElementById("moreDropdown");

    box.style.display =
        (box.style.display === "block")
        ? "none"
        : "block";

    return false;
}


function showAdvancedSearch() {
    alert(
        "Advanced Search\n\n" +
        "Coming Soon™\n\n" +
        "Development was suspended in 2008.\n\n" +
        "Reason:\n" +
        "The engineers were laid off.\n\n" +
        "Please enjoy Basic Search instead."
    );
}


//--------------------------------------------------
// ICQ Search Tabs (Late 2007)
//--------------------------------------------------

function execSearch(mode, element){

    // Remove active state
    document.querySelectorAll(".d3-1-1").forEach(function(tab){

        tab.classList.remove("active-tab");

    });

    // Remove active state from More button
    document.getElementById("moreBtn").classList.remove("active-tab");

    //------------------------------------------------
    // Highlight current selection
    //------------------------------------------------

    if(element.tagName.toLowerCase()=="span"){

        element.classList.add("active-tab");

    }else{

        document.getElementById("moreBtn").classList.add("active-tab");

    }

    //------------------------------------------------
    // Advanced Search
    //------------------------------------------------

    var adv=document.getElementById("advancedSearch");

    if(mode=="web"){

        adv.style.visibility="visible";

    }else{

        adv.style.visibility="hidden";

    }

    //------------------------------------------------
    // Close dropdown
    //------------------------------------------------

    document.getElementById("moreDropdown").style.display="none";

}


//--------------------------------------------------
// More menu
//--------------------------------------------------

function toggleMore(e){

    e.preventDefault();

    var box=document.getElementById("moreDropdown");

    if(box.style.display=="block"){

        box.style.display="none";

    }else{

        box.style.display="block";

    }

    return false;

}


//--------------------------------------------------
// Close menu when clicking outside
//--------------------------------------------------

document.addEventListener("click",function(e){

    if(!e.target.closest(".more-menu")){

        document.getElementById("moreDropdown").style.display="none";

    }

});



      </script>

<script>
(function () {

  // =========================
  // 🟥 TITLE SYSTEM
  // =========================
  const query = new URLSearchParams(window.location.search).get('q');
  document.title = query 
    ? query + " — ICQ.com Search Results"
    : "ICQ.com Search Engine";


  // =========================
  // 🟡 CLEAN STATS FIX (STABLE)
  // =========================
  function fixStats() {
    const el = document.querySelector('.gsc-result-info');

    if (!el || el.dataset.done) return;

    const text = el.innerText;
    const nums = text.match(/[\d,.]+/g);

    if (nums && nums.length >= 2) {
      const count = nums[0];
      const time = nums[nums.length - 1];

      el.innerHTML = `🌟 <b>Report:</b> ${count} glorious results found for the People in ${time} seconds!`;

      el.style.color = "#d93025";
      el.style.fontWeight = "bold";
      el.style.fontFamily = "Arial";

      el.dataset.done = "1";
    }
  }

  setInterval(fixStats, 500);


function polishICQPagination(){

    document.querySelectorAll(".gsc-cursor-box").forEach(function(box){

        if(box.dataset.icqDone) return;

        box.dataset.icqDone = "1";

        box.className = "pg";

        var pages = box.querySelectorAll(".gsc-cursor-page");

        pages.forEach(function(page,i){

            page.textContent = i + 1;

            page.style.color = "#3F9220";
            page.style.fontSize = "15px";
            page.style.fontWeight = "normal";
            page.style.marginRight = "8px";
            page.style.display = "inline";
            page.style.cursor = "pointer";
        });

        // Current page
        var current = box.querySelector(".gsc-cursor-current-page");

        if(current){
            current.style.fontWeight = "bold";
            current.style.textDecoration = "none";
        }

        // Next button
        var next = document.createElement("img");

        next.src = "imgs/right_new.gif";
        next.width = 17;
        next.height = 17;
        next.style.verticalAlign = "middle";
        next.style.marginLeft = "10px";
        next.style.cursor = "pointer";

        next.onclick = function(){

            var current =
                box.querySelector(".gsc-cursor-current-page");

            if(current && current.nextElementSibling){

                current.nextElementSibling.click();

            }

        };

        box.appendChild(next);

    });

}

setInterval(polishICQPagination,300);

// run loop



  // =========================
  // 🟢 WELCOME MESSAGE
  // =========================
  function showWelcome() {
    const q = new URLSearchParams(window.location.search).get('q');
    const box = document.querySelector('.results-border-box');

    if (!q && box) {
      box.innerHTML = `
        <div class="welcome-container">
          <h1>Welcome, Comrade! 🌟</h1>
          <p>The Red Star is ready to guide your search.</p>
          <p class="hint">Type something above to begin 🚩</p>
          <div class="star-icon">★</div>
        </div>
      `;
    }
  }

  window.onload = showWelcome;


  // =========================
  // 👤 USERNAME SYSTEM (FIXED)
  // =========================
(function () {

  function setupUsername() {
    var span = document.getElementById("usernameDisplay");
    if (!span) return;

    // load saved name
    var saved = localStorage.getItem("rss_username");
    if (saved) span.innerHTML = saved;

    span.style.cursor = "pointer";
    span.style.textDecoration = "underline";
    span.style.fontWeight = "bold";

    span.onclick = function () {

      var input = document.createElement("input");
      input.type = "text";
      input.value = span.innerHTML;
      input.style.fontSize = "13px";
      input.style.border = "1px solid #666";

      span.parentNode.replaceChild(input, span);
      input.focus();

      function save() {
        var name = input.value.replace(/^\s+|\s+$/g, "") || "Guest";

        localStorage.setItem("rss_username", name);

        var newSpan = document.createElement("span");
        newSpan.id = "usernameDisplay";
        newSpan.innerHTML = name;
        newSpan.style.cursor = "pointer";
        newSpan.style.textDecoration = "underline";
        newSpan.style.fontWeight = "bold";

        input.parentNode.replaceChild(newSpan, input);

        // reattach
        setupUsername();
      }

      input.onblur = save;
      input.onkeydown = function (e) {
        if (e.keyCode === 13) save(); // Enter key (old style)
      };
    };
  }

  // OLD SCHOOL LOAD (works in Chrome 52)
  window.onload = function () {
    setupUsername();
  };

})();

})();


function goMobile() {
  var query = document.querySelector('input[name="q"]').value;

  if (query.trim() !== "") {
    window.location.href = "mobile/m-results.html?q=" + encodeURIComponent(query);
  } else {
    window.location.href = "mobile/m-index.html";
  }
}
