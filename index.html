<script>
(function () {

  // =========================
  // 🟥 TITLE SYSTEM
  // =========================
  const query = new URLSearchParams(window.location.search).get('q');
  document.title = query 
    ? query + " — ICQ.com Search Results"
    : "ICQ.com Search Engine";


  // =========================
  // 🟡 CLEAN STATS FIX (STABLE)
  // =========================
  function fixStats() {
    const el = document.querySelector('.gsc-result-info');

    if (!el || el.dataset.done) return;

    const text = el.innerText;
    const nums = text.match(/[\d,.]+/g);

    if (nums && nums.length >= 2) {
      const count = nums[0];
      const time = nums[nums.length - 1];

      el.innerHTML = `🌟 <b>Report:</b> ${count} glorious results found for the People in ${time} seconds!`;

      el.style.color = "#d93025";
      el.style.fontWeight = "bold";
      el.style.fontFamily = "Arial";

      el.dataset.done = "1";
    }
  }

  setInterval(fixStats, 500);


  // =========================
  // 🔴 R e e e e d Star FIX
  // =========================
 function polishRedStarPretty() {
  const cursorBoxes = document.querySelectorAll('.gsc-cursor-box');

  cursorBoxes.forEach(cursorBox => {
    if (!cursorBox.getAttribute('data-red-star')) {
      const pages = cursorBox.querySelectorAll('.gsc-cursor-page');

      if (pages.length > 0) {

        // Style the container
        cursorBox.style.fontSize = "20px";
        cursorBox.style.fontWeight = "bold";
        cursorBox.style.textAlign = "center";
        cursorBox.style.marginTop = "20px";

        // Add R-
        const rStart = document.createElement('span');
        rStart.innerText = "R ";
        rStart.style.color = "#d93025";
        cursorBox.insertBefore(rStart, cursorBox.firstChild);

        // Style each "e"
        pages.forEach(page => {
          if (page.firstChild) {
            page.firstChild.nodeValue = "e";
          } else {
            page.textContent = "e";
          }

          // 👇 make them BIG and clickable
          page.style.fontSize = "20px";
          page.style.margin = "0 4px";
          page.style.textDecoration = "none";
          page.style.fontWeight = "bold";
          page.style.color = "#1122cc"; // classic blue
        });

        // Current page highlight ⭐
        const current = cursorBox.querySelector('.gsc-cursor-current-page');
        if (current) {
          current.style.color = "#ff0000";
          current.style.fontSize = "24px";
        }

        // Add ending
        const end = document.createElement('span');
        end.innerText = " d Star! 🌟";
        end.style.color = "#d93025";
        cursorBox.appendChild(end);

        cursorBox.setAttribute('data-red-star', 'true');
      }
    }
  });
}

setInterval(polishRedStarPretty, 500);

// run loop



  // =========================
  // 🟢 WELCOME MESSAGE
  // =========================
  function showWelcome() {
    const q = new URLSearchParams(window.location.search).get('q');
    const box = document.querySelector('.results-border-box');

    if (!q && box) {
      box.innerHTML = `
        <div class="welcome-container">
          <h1>Welcome, Comrade! 🌟</h1>
          <p>The Red Star is ready to guide your search.</p>
          <p class="hint">Type something above to begin 🚩</p>
          <div class="star-icon">★</div>
        </div>
      `;
    }
  }

  window.onload = showWelcome;


  // =========================
  // 👤 USERNAME SYSTEM (FIXED)
  // =========================
(function () {

  function setupUsername() {
    var span = document.getElementById("usernameDisplay");
    if (!span) return;

    // load saved name
    var saved = localStorage.getItem("rss_username");
    if (saved) span.innerHTML = saved;

    span.style.cursor = "pointer";
    span.style.textDecoration = "underline";
    span.style.fontWeight = "bold";

    span.onclick = function () {

      var input = document.createElement("input");
      input.type = "text";
      input.value = span.innerHTML;
      input.style.fontSize = "13px";
      input.style.border = "1px solid #666";

      span.parentNode.replaceChild(input, span);
      input.focus();

      function save() {
        var name = input.value.replace(/^\s+|\s+$/g, "") || "Guest";

        localStorage.setItem("rss_username", name);

        var newSpan = document.createElement("span");
        newSpan.id = "usernameDisplay";
        newSpan.innerHTML = name;
        newSpan.style.cursor = "pointer";
        newSpan.style.textDecoration = "underline";
        newSpan.style.fontWeight = "bold";

        input.parentNode.replaceChild(newSpan, input);

        // reattach
        setupUsername();
      }

      input.onblur = save;
      input.onkeydown = function (e) {
        if (e.keyCode === 13) save(); // Enter key (old style)
      };
    };
  }

  // OLD SCHOOL LOAD (works in Chrome 52)
  window.onload = function () {
    setupUsername();
  };

})();

})();


function goMobile() {
  var query = document.querySelector('input[name="q"]').value;

  if (query.trim() !== "") {
    window.location.href = "mobile/m-results.html?q=" + encodeURIComponent(query);
  } else {
    window.location.href = "mobile/m-index.html";
  }
}
