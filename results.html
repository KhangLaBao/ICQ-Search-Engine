<script>
    function replaceNoResults() {

    const snippet = document.querySelector(".gs-snippet");

    if (!snippet) return;

    if (!snippet.textContent.includes("khớp") &&
        !snippet.textContent.includes("did not match") &&
        !snippet.textContent.includes("No results"))
        return;

    const q = new URLSearchParams(location.search).get("q") || "";

    snippet.innerHTML = `
<div class="nor1">
Your search -
<b>${q}</b>
- did not match any documents.
</div>

<div class="nor2">
Suggestions
</div>

<div class="nor3">
<ul>
<li>Make sure all words are spelled correctly.</li>
<li>Try different keywords.</li>
<li>Try more general keywords.</li>
</ul>
</div>
`;

}

setInterval(replaceNoResults,500);


function changeTab(tab) {

    var timer = setInterval(function () {

        var tabs = document.querySelectorAll(".gsc-tabHeader");

        if (tabs.length > tab) {

            clearInterval(timer);

            tabs[tab].click();

        }

    }, 100);

}


document.addEventListener("click",function(e){

if(!e.target.closest(".more-menu")){

document.getElementById("moreDropdown").style.display="none";


}

});

function toggleMore(e){

    if(e){
        e.preventDefault();
        e.stopPropagation();
    }

    var box = document.getElementById("moreDropdown");

    box.style.display =
        (box.style.display === "block")
        ? "none"
        : "block";

    return false;
}

document.addEventListener("click", function(e){

    if(!e.target.closest(".more-menu")){
        document.getElementById("moreDropdown").style.display = "none";
    }

});



// restore last search

function updateICQHeader() {

    // keyword
    if (qParam) {
        document.getElementById("icqKeyword").textContent = qParam;
    }

    // wait until Google creates the result info
    var info = document.querySelector(".gsc-result-info");
    if (!info) return;

    // Grab every number from the text
    var nums = info.textContent.match(/[\d,.]+/g);

    if (!nums || nums.length === 0) return;

    // Usually the biggest number is the total results
    var total = nums[0];

    // page
    var page = 1;

    var hash = new URLSearchParams(location.hash.substring(1));

    if (hash.has("gsc.page")) {
        page = parseInt(hash.get("gsc.page"), 10) || 1;
    }

    var start = (page - 1) * 10 + 1;
    var end = start + 9;

    document.getElementById("icqStats").innerHTML =
        "Results <b>" + start + " - " + end +
        "</b> of about <b>" + total + "</b>";
  document.getElementById("icqStatsBottom").innerHTML =
        "Results <b>" + start + " - " + end +
        "</b> of about <b>" + total + "</b>";
}

var icqTimer = setInterval(function () {

    if (document.querySelector(".gsc-result-info")) {

        updateICQHeader();

    }

    
}, 300);


function cleanURLs() {

    document.querySelectorAll(".gs-visibleUrl-long").forEach(function(el){

        el.innerHTML = el.innerHTML
            .replace(/^https?:\/\//i, "")
            .replace(/^www\./i, "");

    });

}

setInterval(cleanURLs, 300);

function hideGoogleBranding(){

    ).forEach(function(el){

        el.style.display = "none";

    });

}

window.addEventListener("load", function () {
    const q = new URLSearchParams(location.search).get("q") || "";
    const el = document.getElementById("icqKeyword");

    if (el) {
        el.textContent = q;
    }
});

<script>
(function () {

  // =========================
  // 👤 USERNAME SYSTEM (LEGACY SAFE)
  // =========================
  function setupUsername() {
    var span = document.getElementById("usernameDisplay");
    if (!span) return;

    var saved = localStorage.getItem("rss_username");
    if (saved) span.innerHTML = saved;

    span.style.cursor = "pointer";
    span.style.textDecoration = "underline";
    span.style.fontWeight = "bold";

    span.onclick = function () {

      var input = document.createElement("input");
      input.type = "text";
      input.value = span.innerHTML;
      input.style.fontSize = "13px";
      input.style.border = "1px solid #666";

      span.parentNode.replaceChild(input, span);
      input.focus();

      function save() {
        var name = input.value.replace(/^\s+|\s+$/g, "") || "Guest";

        localStorage.setItem("rss_username", name);

        var newSpan = document.createElement("span");
        newSpan.id = "usernameDisplay";
        newSpan.innerHTML = name;
        newSpan.style.cursor = "pointer";
        newSpan.style.textDecoration = "underline";
        newSpan.style.fontWeight = "bold";

        input.parentNode.replaceChild(newSpan, input);

        setupUsername(); // reattach
      }

      input.onblur = save;
      input.onkeydown = function (e) {
        if (e.keyCode === 13) save();
      };
    };
  }

  // =========================
  // 🟢 WELCOME
  // =========================
// Redirect empty searches back to the homepage.
const q = new URLSearchParams(window.location.search).get("q");

if (!q || !q.trim()) {
    window.location.replace("index.html");
}


  
  // =========================
  // 🟡 STATS FIX
  // =========================
  function fixStats() {
    var el = document.querySelector('.gsc-result-info');
    if (!el) return;

    var text = el.innerText;
    var nums = text.match(/[\d,.]+/g);

    if (nums && nums.length >= 2) {
      el.innerHTML =
        '🌟 <b>Report:</b> ' + nums[0] +
        ' glorious results found for the People in ' +
        nums[nums.length - 1] + ' seconds!';

      el.style.color = "#d93025";
      el.style.fontWeight = "bold";
      el.style.fontFamily = "Arial";
    }
    // Thêm đoạn này vào trong setInterval hiện tại của đồng chí
    document.querySelectorAll('.gsc-imageResult .gs-snippet, .gsc-imageResult .gs-title').forEach(el => {
      el.style.setProperty('color', '#77aaff', 'important',fontWeight = 'bold', fontFamily = 'Arial', 'important');
    });
  }

  // =========================
  // 🔴 PAGINATION STYLE
  // =========================
function polishICQPagination(){

    document.querySelectorAll(".gsc-cursor-box").forEach(function(box){

        if(box.dataset.icqDone) return;

        box.dataset.icqDone = "1";

        box.className = "pg";

        var pages = box.querySelectorAll(".gsc-cursor-page");

        pages.forEach(function(page,i){

            page.textContent = i + 1;

            page.style.color = "#3F9220";
            page.style.fontSize = "15px";
            page.style.fontWeight = "normal";
            page.style.marginRight = "8px";
            page.style.display = "inline";
            page.style.cursor = "pointer";
    page.style.setProperty("text-decoration", "underline", "important");
        });

          // Current page
          var current = box.querySelector(".gsc-cursor-current-page");

          if(current){
              current.style.fontWeight = "bold";
              current.style.textDecoration = "none";
          }

          // Find Google's next page (if it exists)
          var nextGoogle = box.querySelector(".gsc-cursor-page.gsc-cursor-next");

          // Fallback: use the page after the current one
          if(!nextGoogle && current){
              nextGoogle = current.nextElementSibling;
          }

          // Next button
          var next = document.createElement("img");
        next.src = "imgs/right_new.gif";
        next.width = 17;
        next.height = 17;
        next.style.verticalAlign = "middle";
        next.style.marginLeft = "10px";
        next.style.cursor = "pointer";

       next.onclick = function(){

    if(nextGoogle){
        nextGoogle.click();
    }

};

        box.appendChild(next);

    });

}

setInterval(polishICQPagination,300);


  // =========================
  // 🚀 INIT (ONE ONLY!)
  // =========================
  window.onload = function () {
    setupUsername();
    showWelcome();
    // Populate search input with query parameter so term remains until changed
    try {
      var qParam = new URLSearchParams(window.location.search).get('q');
      var inp = document.querySelector('input.legacy-input[name="q"]') || document.querySelector('input.legacy-input');
      if (qParam) {
        if (inp) { inp.value = qParam; localStorage.setItem('rss_last_q', qParam); }
      } else {
        var last = localStorage.getItem('rss_last_q');
        if (last && inp && !inp.value) inp.value = last;
      }
      if (inp) {
        var form = inp.form || document.querySelector('form');
        if (form) form.addEventListener('submit', function () { localStorage.setItem('rss_last_q', inp.value || ''); });
      }
    } catch (e) { /* ignore URL parsing issues */ }

    setInterval(fixStats, 400);
    setInterval(polishRedStar, 500);
  };

})();
</script>
